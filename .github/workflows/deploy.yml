name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble standalone bundle
        # "output: standalone" (next.config.mjs) traces only the files Next
        # actually needs at runtime into .next/standalone, instead of
        # shipping the entire node_modules tree over FTP. Static assets
        # aren't included in the trace, so they're copied in manually.
        run: |
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          mkdir -p .next/standalone/tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .next/standalone/tmp/restart.txt

      - name: Upload to server via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./.next/standalone/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.DS_Store
